<div class="cadastro-page">

    <div class="cadastro-card">

        <div class="corner corner-top-left"></div>
        <div class="corner corner-top-right"></div>
        <div class="corner corner-bottom-left"></div>
        <div class="corner corner-bottom-right"></div>

        <div class="logo">

            <img src="assets/img/logo.png" alt="Grimoire of Stars">

            <h1>Grimoire of Stars</h1>

            <p>INGRESSE NO REPOSITÓRIO ARCANO</p>

        </div>

        <form
            class="cadastro-form"
            [formGroup]="cadastroForm"
            (ngSubmit)="cadastrar()">

            <div class="input-group">

                <label for="nome">
                    Nome do Aventureiro
                </label>

                <input
                    id="nome"
                    type="text"
                    placeholder="Seu nome"
                    formControlName="nome">

            </div>

            <div class="input-group">

                <label for="email">
                    Endereço de Email
                </label>

                <input
                    id="email"
                    type="email"
                    placeholder="mystic@arcanum.com"
                    formControlName="email">

            </div>

            <div class="input-group">

                <label for="senha">
                    Palavra de Passe
                </label>

                <input
                    id="senha"
                    type="password"
                    placeholder="••••••••••"
                    formControlName="senha">

            </div>

            <div class="input-group">

                <label for="confirmarSenha">
                    Confirmar Palavra de Passe
                </label>

                <input
                    id="confirmarSenha"
                    type="password"
                    placeholder="••••••••••"
                    formControlName="confirmarSenha">

            </div>

            @if (mensagemErro) {

                <div class="erro">

                    {{ mensagemErro }}

                </div>

            }

            <button type="submit">

                CRIAR<br>
                GRIMÓRIO

            </button>

        </form>

        <div class="divider"></div>

        <div class="footer">

            <span>Já possui uma conta?</span>

            <a routerLink="/login">

                Entrar

            </a>

        </div>

    </div>

</div>
