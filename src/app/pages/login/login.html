<link rel="stylesheet" href="login.css">
<div class="login-page">

    <div class="login-card">

        <div class="corner corner-top-left"></div>
        <div class="corner corner-top-right"></div>
        <div class="corner corner-bottom-left"></div>
        <div class="corner corner-bottom-right"></div>

        <div class="logo">

            <img src="assets/img/logo.png" alt="Grimoire of Stars">

            <h1>Grimoire of Stars</h1>

            <p>ACESSE SEU REPOSITÓRIO ARCANO</p>

        </div>

        <form class="login-form" (ngSubmit)="entrar()">

            <div class="input-group">

                <label for="email">
                    Endereço de Email
                </label>

                <input
                    id="email"
                    type="email"
                    name="email"
                    placeholder="mystic@arcanum.com"
                    [(ngModel)]="email">

            </div>

            <div class="input-group">

                <div class="label-row">

                    <label for="senha">
                        Palavra de Passe
                    </label>

                    <a href="#">
                        Esqueceu?
                    </a>

                </div>

                <input
                    id="senha"
                    type="password"
                    name="senha"
                    placeholder="••••••••••"
                    [(ngModel)]="senha">

            </div>

            @if (mensagemErro) {

                <div class="erro">

                    {{ mensagemErro }}

                </div>

            }

            <button type="submit">

                INICIAR A<br>
                AVENTURA

            </button>

        </form>

        <div class="divider"></div>

        <div class="footer">

            <span>Novo nestes reinos?</span>

            <a routerLink="/cadastro">

                Cadastre-se

            </a>

        </div>

    </div>

</div>
