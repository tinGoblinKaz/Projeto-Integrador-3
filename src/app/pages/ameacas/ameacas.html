<section class="min-h-screen bg-[#050505] text-zinc-100 p-8">
  <h1 class="text-4xl text-[#c7b07b] tracking-[0.25em] mb-8">Ameaças</h1>

  <form [formGroup]="form" (ngSubmit)="salvar()" class="bg-[#0a0a0a] border border-white/10 rounded-3xl p-6 mb-8">
    <h2 class="text-2xl mb-6">{{ editando ? 'Editar ameaça' : 'Nova ameaça' }}</h2>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <input formControlName="nome" placeholder="Nome" class="bg-[#111] border border-white/10 rounded-xl p-4">
      <input formControlName="tipo" placeholder="Tipo" class="bg-[#111] border border-white/10 rounded-xl p-4">
      <input type="number" formControlName="nivel" placeholder="Nível" class="bg-[#111] border border-white/10 rounded-xl p-4">
      <input type="number" formControlName="vida" placeholder="Vida" class="bg-[#111] border border-white/10 rounded-xl p-4">
    </div>

    <textarea formControlName="descricao" placeholder="Descrição" rows="4" class="w-full mt-4 bg-[#111] border border-white/10 rounded-xl p-4"></textarea>

    <div class="flex gap-3 mt-6">
      <button class="bg-[#c7b07b] text-black font-bold rounded-xl px-6 py-3">
        {{ editando ? 'Salvar alterações' : 'Cadastrar' }}
      </button>

      @if (editando) {
        <button type="button" (click)="limpar()" class="border border-white/10 rounded-xl px-6 py-3">
          Cancelar
        </button>
      }
    </div>
  </form>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    @for (ameaca of ameacas; track ameaca.id) {
      <article class="bg-[#0a0a0a] border border-white/10 rounded-3xl p-6">
        <h2 class="text-2xl text-[#c7b07b]">{{ ameaca.nome }}</h2>
        <p class="text-zinc-400">{{ ameaca.tipo }}</p>
        <p>Nível: {{ ameaca.nivel }}</p>
        <p>Vida: {{ ameaca.vida }}</p>
        <p class="mt-3 text-zinc-300">{{ ameaca.descricao }}</p>
        <p class="mt-3 text-sm text-zinc-400">
          Status: {{ ameaca.status === 1 ? 'Ativo' : 'Inativo' }}
        </p>

        <div class="flex flex-wrap gap-2 mt-5">
          <button (click)="editar(ameaca)" class="border border-[#c7b07b] text-[#c7b07b] px-4 py-2 rounded-xl">Editar</button>
          <button (click)="alterarStatus(ameaca)" class="border border-white/10 px-4 py-2 rounded-xl">
            {{ ameaca.status === 1 ? 'Inativar' : 'Ativar' }}
          </button>
          <button (click)="excluir(ameaca.id)" class="border border-red-800 text-red-400 px-4 py-2 rounded-xl">Excluir</button>
        </div>
      </article>
    }
  </div>
</section>
